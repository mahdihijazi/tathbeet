<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tathbeet Sign-In</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #10141d;
      color: #f5f7fb;
      font-family: sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border-radius: 24px;
      background: #181e2b;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tathbeet</h1>
    <p>This link should open the Android app to finish sign-in.</p>
    <p>If the app did not open automatically, go back to the email and tap the link again after enabling the supported web address for Tathbeet on your phone.</p>
  </main>
</body>
</html>
