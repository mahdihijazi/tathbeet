<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tathbeet Sign-In</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #10141d;
      color: #f5f7fb;
      font-family: sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      border-radius: 24px;
      background: #181e2b;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.5;
    }

    a {
      color: #8cc5ff;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tathbeet</h1>
    <p id="status">Trying to open the app…</p>
    <p id="manual" class="hidden">
      If the app does not open automatically, tap
      <a id="open-app-link" href="#">Open Tathbeet</a>.
    </p>
  </main>
  <script>
    (function () {
      const emailLink = window.location.href;
      const encodedEmailLink = encodeURIComponent(emailLink);
      const appUrl = `tathbeet://email-link?emailLink=${encodedEmailLink}`;
      const openAppLink = document.getElementById("open-app-link");
      const manual = document.getElementById("manual");
      const status = document.getElementById("status");

      openAppLink.href = appUrl;
      status.textContent = "Trying to open the app to finish sign-in…";

      window.location.replace(appUrl);

      window.setTimeout(function () {
        manual.classList.remove("hidden");
        status.textContent = "The browser did not switch to the app automatically.";
      }, 1200);
    })();
  </script>
</body>
</html>
